name: odoo_location_tracker
description: Employee Live Location Tracker for Odoo

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  http: ^1.2.0
  background_locator_2: ^2.0.5
  shared_preferences: ^2.2.2
  flutter_foreground_task: ^6.1.2
  permission_handler: ^11.3.0
  google_fonts: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
